name: Build Docker Image

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      tag:
        required: true
        type: string
      latest:
        required: true
        type: boolean

permissions:
  contents: read
  packages: write

env:
  CI: true

jobs:
  generate-metadata:
    name: Generate Metadata
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.generate.outputs.TAGS }}
      labels: ${{ steps.generate.outputs.LABELS }}
    steps:
      - id: checkout
        name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - id: generate
        name: Generate tags and labels
        run: |
          NAMESPACE="ghcr.io/${{ github.repository }}"
          URL="https://github.com/${{ github.repository }}"
          METADATA="org.opencontainers.image"
          REVISION=$(git rev-parse HEAD)
          VERSION="${{ inputs.version }}"
          TITLE="${{ github.repository }}"

          # Labels information
          echo "LABELS<<EOF" >> "$GITHUB_OUTPUT"
          echo "$METADATA.source=$URL" >> "$GITHUB_OUTPUT"
          echo "$METADATA.revision=$REVISION" >> "$GITHUB_OUTPUT"
          echo "$METADATA.version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "$METADATA.title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          # Tags information
          if [ "${{ inputs.latest }}" = "true" ]; then
            echo "TAGS<<EOF" >> "$GITHUB_OUTPUT"
            echo "$NAMESPACE:$VERSION" >> "$GITHUB_OUTPUT"
            echo "$NAMESPACE:latest" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "TAGS<<EOF" >> "$GITHUB_OUTPUT"
            echo "$NAMESPACE:$VERSION" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

  build-and-push-image:
    name: Build and Push Image
    needs: generate-metadata
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - id: login
        name: Login to the container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: setup-qemu
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - id: setup-docker-buildx
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - id: build-and-push
        name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: ${{ needs.generate-metadata.outputs.tags }}
          labels: ${{ needs.generate-metadata.outputs.labels }}
          push: true